<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Input Tester Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #0f0; padding: env(safe-area-inset-top) 20px 40px; user-select: none; }
        .section { border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: #111; }
        h2 { font-size: 11px; color: #888; text-transform: uppercase; margin: 0 0 10px; }
        .key-tag { display: inline-block; padding: 6px 12px; margin: 4px; background: #222; border-radius: 6px; font-family: monospace; font-size: 13px; transition: 0.1s; }
        .active { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .axis-bar { display: inline-block; width: 120px; height: 8px; background: #333; position: relative; border-radius: 4px; vertical-align: middle; }
        .axis-val { position: absolute; height: 100%; background: #0f0; border-radius: 4px; }
        #kb-focus { position: fixed; top: -100px; left: -100px; width: 1px; height: 1px; opacity: 0; }
        .btn-act { width: 100%; padding: 18px; background: #0088ff; color: #fff; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; margin-bottom: 20px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <button id="activate-kb" class="btn-act">Включить физическую клавиатуру</button>
    <input type="text" id="kb-focus" inputmode="none">

    <div class="section">
        <h2>Scroll & Wheel</h2>
        <div id="scroll-display">Ожидание...</div>
    </div>

    <div class="section">
        <h2>Keyboard / Volume Keys</h2>
        <div id="keyboard-display">Ожидание...</div>
    </div>

    <div class="section">
        <h2>Gamepads</h2>
        <div id="gamepad-display">Нажмите любую кнопку...</div>
    </div>

    <script>
        const activeKeys = new Set();
        const kbDisplay = document.getElementById('keyboard-display');
        const scrollDisplay = document.getElementById('scroll-display');
        const gpDisplay = document.getElementById('gamepad-display');
        const focusInput = document.getElementById('kb-focus');
        const activateBtn = document.getElementById('activate-kb');

        // Кнопка фокуса
        activateBtn.onclick = () => {
            focusInput.focus();
            setTimeout(() => focusInput.focus(), 150);
            activateBtn.innerText = "Клавиатура в фокусе ✅";
            activateBtn.style.background = "#1a1a1a";
        };

        // Клавиатура
        const handleKey = (e, isDown) => {
            const key = e.code || e.key;
            isDown ? activeKeys.add(key) : activeKeys.delete(key);
            kbDisplay.innerHTML = activeKeys.size ? Array.from(activeKeys).map(k => `<span class="key-tag active">${k}</span>`).join('') : 'Ожидание...';
        };
        window.onkeydown = focusInput.onkeydown = (e) => handleKey(e, true);
        window.onkeyup = focusInput.onkeyup = (e) => handleKey(e, false);

        // Скролл
        let sT;
        window.onwheel = (e) => {
            scrollDisplay.innerHTML = `<span class="key-tag active">Scroll ${e.deltaY > 0 ? 'Down' : 'Up'}</span>`;
            clearTimeout(sT);
            sT = setTimeout(() => scrollDisplay.innerText = 'Ожидание...', 700);
        };

        // Геймпад
        function updateGP() {
            const gps = navigator.getGamepads();
            let h = '';
            for (const gp of gps) {
                if (!gp) continue;
                h += `<div><small>${gp.id.slice(0,25)}</small><br><br>`;
                gp.buttons.forEach((b, i) => { if(b.pressed) h += `<span class="key-tag active">B${i}</span> `; });
                h += '<br><br>';
                gp.axes.forEach((a, i) => {
                    const w = (a + 1) * 50;
                    h += `Axis ${i}: <div class="axis-bar"><div class="axis-val" style="width:${w}%"></div></div> ${a.toFixed(2)}<br>`;
                });
                h += '</div><hr style="border:0; border-top:1px solid #222; margin:15px 0;">';
            }
            if(h) gpDisplay.innerHTML = h;
            requestAnimationFrame(updateGP);
        }
        updateGP();

        // Service Worker для Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => {
                console.log('PWA Ready');
            });
        }
    </script>
</body>
</html>
